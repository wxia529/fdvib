name: Release Linux package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Build and package
        id: package
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          package="fdvib-${version}-linux-x86_64-glibc-2.17"

          docker run --rm \
            -e VERSION="$version" \
            -e PACKAGE="$package" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            quay.io/pypa/manylinux2014_x86_64:latest \
            bash -lc '
              set -euo pipefail

              cmake --version
              gcc --version
              rm -rf build-manylinux dist
              cmake -S . -B build-manylinux \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_TESTING=ON \
                -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
              cmake --build build-manylinux --parallel
              ctest --test-dir build-manylinux --output-on-failure

              reported_version="$(./build-manylinux/fdvib --version)"
              if [[ "$reported_version" != "fdvib $VERSION" ]]; then
                echo "Version $VERSION does not match $reported_version" >&2
                exit 1
              fi

              highest_glibc="$(readelf --version-info build-manylinux/fdvib \
                | grep -oE "GLIBC_[0-9.]+" \
                | sed "s/GLIBC_//" \
                | sort -Vu \
                | tail -1)"
              if [[ "$(printf "%s\n" "$highest_glibc" 2.17 | sort -V | tail -1)" != "2.17" ]]; then
                echo "Binary requires glibc $highest_glibc, expected at most 2.17" >&2
                exit 1
              fi
              if ldd build-manylinux/fdvib | grep -Eq "libstdc\\+\\+|libgcc_s"; then
                echo "C++ runtime libraries were not linked statically" >&2
                exit 1
              fi

              cmake --install build-manylinux --prefix "dist/$PACKAGE"
              tar -C dist -czf "dist/$PACKAGE.tar.gz" "$PACKAGE"
              (cd dist && sha256sum "$PACKAGE.tar.gz" > "$PACKAGE.tar.gz.sha256")
            '

          echo "archive=dist/$package.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/$package.tar.gz.sha256" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "${{ steps.package.outputs.archive }}" \
            "${{ steps.package.outputs.checksum }}" \
            --verify-tag \
            --generate-notes \
            --title "FDVIB ${{ steps.package.outputs.version }}"
